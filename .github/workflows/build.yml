name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # required to publish the rolling "latest" Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Fetch interception.dll + installer
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/get-interception.ps1

      - name: Fetch ViGEmBus installer (embedded in the exe)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/get-vigembus.ps1

      - name: Publish (self-contained single-file, win-x64)
        shell: pwsh
        run: >
          dotnet publish KeyboardToGamepad.csproj -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Stage release files
        shell: pwsh
        run: |
          $stage = "dist/KeyboardToGamepad"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item publish/KeyboardToGamepad.exe $stage/
          Copy-Item publish/config.json $stage/
          Copy-Item README.md, LICENSE, THIRD-PARTY-NOTICES.md $stage/
          @"
          KeyboardToGamepad - quick start
          ===============================
          Everything is inside KeyboardToGamepad.exe (the .NET runtime, interception.dll, and both
          driver installers). You only need this exe; config.json is here so you can edit mappings.

          1) Run KeyboardToGamepad.exe
             The first time, if the ViGEmBus or Interception driver is missing, it offers (in the
             TUI) to install it for you (a Windows admin prompt appears -- click Yes). Installing
             the Interception driver needs ONE reboot; run the exe again afterwards.
          2) Edit config.json to change key mappings or controllerType (xbox360 | ds4).
             (If config.json is missing, the exe recreates a default one next to itself.)
          "@ | Out-File -Encoding utf8 "$stage/SETUP.txt"
          Compress-Archive -Path "$stage/*" -DestinationPath "KeyboardToGamepad-win-x64.zip" -Force

      - name: Upload build artifact (every push)
        uses: actions/upload-artifact@v7
        with:
          name: KeyboardToGamepad-win-x64
          path: KeyboardToGamepad-win-x64.zip

      - name: Point the "latest" tag at this commit
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH "repos/${{ github.repository }}/git/refs/tags/latest" -f sha="${{ github.sha }}" -F force=true \
            || gh api --method POST "repos/${{ github.repository }}/git/refs" -f ref="refs/tags/latest" -f sha="${{ github.sha }}"

      - name: Refresh rolling "latest" release (every push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest build
          body: Automated build of the latest commit (${{ github.sha }}).
          files: KeyboardToGamepad-win-x64.zip
